
<!DOCTYPE html>
<html lang="zh-CN">
<head>


  <meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#f5f5f7" />

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Krisy" />

<link rel="apple-touch-icon" sizes="180x180" href="./krisy-icon-180.png">
  <meta charset="utf-8" />

  <title>Calendar</title>

  <!-- FullCalendar (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="./style.css?v=20260211">
</head>

<body>
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-inner">
    <div class="topbar-left">
      <div class="brand">
        <span class="dot"></span>
        <span class="name">Krisy Calendar</span>
      </div>
      <div class="cloud">
        <button class="btn" id="googleLoginBtn">Google 登录</button>
        <span class="help" id="cloudStatus">云端：未连接</span>
      </div>
    </div>

    <div class="topbar-center">
      <button class="btn" id="prevBtn">◀</button>
      <button class="btn" id="todayBtn">今天</button>
      <button class="btn" id="nextBtn">▶</button>

      <div class="titlebar" id="titlebar">—</div>

      <div class="seg">
        <button data-view="dayGridMonth" class="active">Month</button>
        <button data-view="timeGridWeek">Week</button>
        <button data-view="timeGridDay">day</button>
      </div>
    </div>

    <div class="topbar-right">
  <button class="btn btn-primary" id="addBtn">＋ </button>
</div>

  </div>
  </div>

  <!-- Main Layout -->
  <div class="wrap">
    <aside class="sidebar">
      <div class="side-section">
        <div class="side-title">Mini View</div>
        <div class="mini" id="miniCal"></div>
      </div>

      <div class="side-section">
        <div class="side-title">Invoice</div>

        <div style="display:flex; flex-direction:column; gap:10px;">
        <button
           class="btn btn-primary"
           onclick="window.open('./invoice.html', '_blank')"
    >          Create Invoice
        </button>

        <button
          class="btn"
          onclick="window.open('./invoiceRecord.html', '_blank')"
    >          Invoice Record
        </button>
      </div>

  
    <div class="side-section">
       <div class="side-title">Clear</div>
       <button class="btn" id="cleanupBtn" title="只删除云端未被任何事件引用的附件">🧹 智能清理</button>
       <div class="help" style="margin-top:8px;">清理云端孤立附件（不会影响事件本身）</div>
   </div>

      <div class="side-section">
        <div class="side-title">Export</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <div class="help" style="margin-bottom:6px;"></div>
          <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
              <input class="btn" style="padding:8px 10px; flex:1; min-width:0;" id="exportStart" type="date" />
              <span style="flex:0 0 auto; opacity:.6;">—</span>
              <input class="btn" style="padding:8px 10px; flex:1; min-width:0;" id="exportEnd" type="date" />
          </div>


          <button class="btn" id="exportMyViewBtn">My_View</button>
          <button class="btn" id="exportTaxBtn"> Tax_Export</button>
          <div class="help">当前为原型：导出为 CSV（下载）。</div>
        </div>
     
      
  


<div>
    </aside>

    <main class="content">
      <div id="calendar"></div>
    </main>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle">Event</h3>
        <button class="btn" id="closeBtn">关闭</button>
      </div>

      <div class="modal-body">
        <div class="grid2">
          <div class="field" id="typeField">
            <label class="req">Type</label>
            <select id="type">
              <option value="Work">Work</option>
              <option value="Expense">Expense</option>
              <option value="Life">Life</option>
            </select>
          </div>

         <div class="field" id="dateField">
            <label class="req">Date</label>
            <input id="date" type="date" />
          </div>

          <div class="field" id="startField">
            <label class="req">Start</label>
            <input id="start" type="time" />
          </div>

          <div class="field" id="durationField">
            <label id="durationLabel">Duration（Hour）</label>
            <input id="duration" type="number" step="0.25" min="0" />
            <div class="help" id="durationHelp">Work：完工后必填；Life：可选。</div>
          </div>

          <div class="field" id="clientField">
            <label class="req">Client</label>
           <div class="row-inline">
            <select id="client"></select>
            <button class="btn" type="button" id="editClientBtn">编辑</button>
            <button class="btn" type="button" id="manageClientsBtn">管理客户</button>
           </div>

            <!-- 自动显示地址 + 地图链接 -->
            <div class="help" id="clientAddressBox" style="display:none;">
              <a id="clientMapLink" href="#" target="_blank" rel="noopener noreferrer"></a>
            </div>

            <div class="help"></div>
          </div>

          <div class="field" id="repeatField">
            <label>Repeat</label>
            <select id="repeat">
              <option value="none">Once</option>
              <option value="weekly">Weekly</option>
              <option value="fortnightly">Fornightly</option>
            </select>
            <div class="help">重复时自动生成 6 次（含本次）</div>
          </div>

          <div class="field" id="titleField">
            <label>Note（可选）</label>
            <input id="title" type="text" />
          </div>

          <div class="field" id="amountField">
            <label class="req">Amount</label>
            <input id="amount" type="number" step="0.01" min="0" />
            <div class="help" id="amountHelp"></div>
          </div>

          <div class="field" id="categoryField">
            <label class="req">Category</label>
            <select id="category">
              <option value="">请选择</option>
              <option value="Tools">Tools</option>
              <option value="Fuels">Fuels</option>
              <option value="Vehicle">Vehicle</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <!-- ✅ Sprint2：附件（拍照/上传 + 缩略图 + 可删除/新增） -->
          <div class="field" id="attachmentField" style="grid-column: 1 / -1;">
            <label id="attachmentLabel">Attachments</label>

            <input
              id="attachmentFiles"
              type="file"
              accept="image/*"
              multiple
            />

            <div class="thumb-grid" id="attachmentPreview"></div> 
            
            <div id="uploadProgressBox" style="display:none; margin-top:10px;">
              <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">
                Uploading：<span id="uploadProgressText">0%</span>
              </div>
              <div style="height:8px; background:#e5e7eb; border-radius:999px; overflow:hidden;">
                <div id="uploadProgressBar" style="height:100%; width:0%; background:#0a84ff; border-radius:999px;"></div>
              </div>
            </div>
            
            <div class="help" id="attachmentHelp">
             
              提示：附件需要 Google 登录（云端存储在 Drive）
            </div>
          </div>
        </div>

        <div style="margin-top:12px;" class="help" id="validationHint"></div>
      </div>

      <div class="modal-foot">
        <button class="btn" id="deleteBtn" style="margin-right:auto; display:none;">删除</button>
        <button class="btn" id="saveDraftBtn">排班/草稿</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 图片预览（点缩略图打开大图） -->
     <!-- Client Manager Modal -->
  <div class="overlay" id="clientOverlay" style="display:none;">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="clientModalTitle">
      <div class="modal-head">
        <h3 id="clientModalTitle">客户管理</h3>
        <button class="btn" type="button" id="clientCloseBtn">关闭</button>
      </div>

      <div class="modal-body">
        <div class="client-tools">
          <button class="btn" type="button" id="clientAddBtn">+ 新增客户</button>
        </div>

        <div class="client-list" id="clientList"></div>
        <div class="help" id="clientHint"></div>
      </div>

      <div class="modal-foot">
        <button class="btn btn-primary" type="button" id="clientSaveBtn">保存</button>
      </div>
    </div>
  </div>
  <div class="img-viewer" id="imgViewer" style="display:none;">
    <div class="img-viewer-inner">
      <button class="btn" id="imgViewerClose">关闭</button>
      <img id="imgViewerImg" alt="preview" />
    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script src="./app.js" defer></script>
</body>
</html>
